services:
  - type: web
    env: python
    buildCommand: CARGO_HOME=/tmp/cargo pip install -r requirements.txt && python seed.py
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8